name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'reports/**'
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Checkout gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

      - name: Copy conversion scripts
        run: |
          git checkout master -- scripts/md_to_html.py
          git checkout master -- scripts/generate_history_index.py
          git checkout master -- scripts/generate_landing_page.py
          git checkout master -- scripts/generate_metrics_page.py
          git checkout master -- scripts/convert_docs_to_html.py

      - name: Generate HTML from latest reports
        run: |
          # Get daily reports (YYYY-MM-DD.md) — exclude pressure_variants
          git checkout master -- reports/20*.md
          
          # Also get pressure_variants reports
          git checkout master -- reports/pressure_variants_*.md || true
          
          # Convert all to HTML
          for report in reports/*.md; do
            if [ -f "$report" ]; then
              filename=$(basename "$report" .md)
              python3 scripts/md_to_html.py "$report" "history/${filename}.html"
            fi
          done
          
          # Latest DAILY report to current/ (exclude pressure_variants)
          latest=$(ls -1 reports/20*.md | sort | tail -1)
          if [ -f "$latest" ]; then
            python3 scripts/md_to_html.py "$latest" "current/index.html"
          fi
          
          # Clean up temporary files
          rm -rf reports/

      - name: Convert documentation to HTML
        run: |
          # Get GLOSSARY.md from docs/
          git checkout master -- docs/GLOSSARY.md
          
          # Convert to HTML
          python3 scripts/convert_docs_to_html.py docs/GLOSSARY.md docs/GLOSSARY.html
          
          # Clean up temporary markdown
          rm -rf docs/*.md

      - name: Update history index
        run: |
          python3 scripts/generate_history_index.py

      - name: Generate landing page
        run: |
          python3 scripts/generate_landing_page.py

      - name: Generate metrics timeline
        run: |
          mkdir -p metrics
          python3 scripts/generate_metrics_page.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Don't commit helper scripts to gh-pages
          rm -rf scripts/
          git add .
          git diff --cached --quiet || git commit -m "Update GitHub Pages: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
