name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'reports/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Checkout gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

      - name: Copy conversion script
        run: |
          git checkout master -- scripts/md_to_html.py

      - name: Generate HTML from latest reports
        run: |
          # Get daily reports from master
          git checkout master -- reports/
          
          # Convert daily reports to history HTML files
          for report_dir in reports/daily/*/; do
            if [ -f "${report_dir}report.md" ]; then
              date=$(basename "$report_dir")
              python3 scripts/md_to_html.py "${report_dir}report.md" "history/${date}.html"
            fi
          done
          
          # Also convert pressure_variants reports (top-level reports/*.md)
          for report in reports/*.md; do
            if [ -f "$report" ]; then
              filename=$(basename "$report" .md)
              python3 scripts/md_to_html.py "$report" "history/${filename}.html"
            fi
          done
          
          # Latest DAILY report to current/ (not pressure_variants)
          latest_daily=$(ls -1d reports/daily/*/ | sort | tail -1)
          if [ -n "$latest_daily" ] && [ -f "${latest_daily}report.md" ]; then
            python3 scripts/md_to_html.py "${latest_daily}report.md" "current/index.html"
          fi
          
          # Clean up temporary files
          rm -rf reports/

      - name: Update history index
        run: |
          python3 << 'EOF'
          from pathlib import Path
          import re

          def _extract_best_model(html_content):
              """Extract best model + F1 from report HTML."""
              text = re.sub(r'<[^>]+>', '', html_content)
              m = re.search(r'Best model:\s*([\w_]+)\s+\(F1:\s*([0-9.]+)\)', text)
              if m:
                  return f"{m.group(1)} (F1: {m.group(2)})"
              m = re.search(r'Best overall[^:]*:\s*([\w_]+)', text)
              if m:
                  model = m.group(1)
                  f1_m = re.search(f'{model}</td>\\s*<td>([0-9.]+)', html_content)
                  if f1_m:
                      return f"{model} (F1: {f1_m.group(1)})"
                  return model
              return 'N/A'

          history_dir = Path('history')
          reports = sorted(history_dir.glob('*.html'), reverse=True)

          cards = []
          for report in reports:
            if report.name == 'index.html':
              continue
            date = report.stem
            content = report.read_text()
            best = _extract_best_model(content)
            
            cards.append(f'''                <div class="card">
                    <h3>{date}</h3>
                    <p>Best model: {best}</p>
                    <a href="{report.name}">View Report →</a>
                </div>''')
          
          html = f'''<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — Rain Analysis</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <header>
        <h1>🌧️ Rain Prediction Model Analysis</h1>
        <p>Automated performance tracking and reports</p>
    </header>

    <nav>
        <a href="../index.html">Home</a>
        <a href="../current/index.html">Latest Report</a>
        <a href="../history/index.html" class="active">History</a>
        <a href="../metrics/index.html">Metrics Timeline</a>
    </nav>

    <main>
        <section>
            <h2>📅 Historical Reports</h2>
            <p>Daily analysis reports, newest first.</p>
            
            <div class="cards">
{chr(10).join(cards)}
            </div>
        </section>
    </main>

    <footer>
        <p>Auto-generated from <a href="https://github.com/Kickoman/rain-analysis">rain-analysis</a> repository</p>
    </footer>
</body>
</html>'''
          
          Path('history/index.html').write_text(html)
          print('✅ Updated history/index.html')
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update GitHub Pages: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push origin gh-pages
